# The dashboard container IS the environment (sibling convention). Engine
# buttons run `docker compose` for satnogs-id / satnogs-decoder through the
# host docker socket — bind mounts requested that way resolve on the HOST,
# so the repo and its siblings are mounted at their host paths (${PWD}),
# exactly "the same absolute paths the defaults expect".
services:
  dashboard:
    build: .
    ports:
      - "8000:8000"
    working_dir: ${PWD}
    environment:
      DASHBOARD_DB: ${DASHBOARD_DB:-${PWD}/dashboard.db}
      SATNOGS_SIGNAL_DB: ${SATNOGS_SIGNAL_DB:-${PWD}/../satnogs-signal/triage.db}
      SATNOGS_ID_DIR: ${SATNOGS_ID_DIR:-${PWD}/../satnogs-id}
      SATNOGS_DECODER_DIR: ${SATNOGS_DECODER_DIR:-${PWD}/../satnogs-decoder}
    volumes:
      - ${PWD}/..:${PWD}/..
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  # Fills the review queue: runs satnogs-signal's poller on an interval so
  # ../satnogs-signal/triage.db populates itself (run.sh builds the image).
  # $$ keeps the interval expansion for the container shell, not compose.
  poller:
    image: satnogs-signal
    working_dir: ${PWD}/../satnogs-signal
    environment:
      HF_HOME: /hf-cache
    env_file:
      - path: .env
        required: false
    volumes:
      - ${PWD}/..:${PWD}/..
      - hf-cache:/hf-cache
    command: sh -c 'while true; do python scripts/run_poller.py || echo "poller run failed — retrying next interval"; sleep $${POLL_INTERVAL_S:-900}; done'
    restart: unless-stopped

volumes:
  hf-cache:
